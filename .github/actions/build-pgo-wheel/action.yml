name: Build PGO wheel
description: Builds a PGO-optimized wheel for pydantic-monty

inputs:
  interpreter:
    description: 'Interpreter(s) to build the wheel for'
    required: true
  rust-toolchain:
    description: 'Rust toolchain to use'
    required: true

outputs:
  wheel-dir:
    description: 'Path to the directory containing built wheels'
    value: ${{ steps.find_wheel.outputs.dir }}

runs:
  using: 'composite'
  steps:
    - name: prepare profiling directory
      shell: bash
      run: mkdir -p ${{ github.workspace }}/profdata

    - name: build initial wheel (instrumented)
      uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1.50.1
      with:
        manylinux: auto
        args: >
          --release
          --out pgo-wheel
          --interpreter 3.12
        rust-toolchain: ${{ inputs.rust-toolchain }}
        docker-options: -e CI
        working-directory: crates/monty-python
      env:
        RUSTFLAGS: '-Cprofile-generate=${{ github.workspace }}/profdata'

    # `exercise.py` drives `pydantic_monty.Monty()` which spawns the `monty`
    # worker subprocess — build an instrumented worker so PGO data covers
    # both the parent (FFI/pool/proto in pydantic-monty) and the worker
    # (bytecode interpreter in monty-cli).
    - name: build instrumented monty binary
      shell: bash
      run: cargo build --release -p monty-cli
      env:
        RUSTFLAGS: '-Cprofile-generate=${{ github.workspace }}/profdata'

    - name: generate pgo data
      run: |
        export RUST_HOST=$(rustc --print host-tuple)
        if [ "$RUNNER_OS" = "Windows" ]; then
          MONTY_BIN="$GITHUB_WORKSPACE/target/release/monty.exe"
        else
          MONTY_BIN="$GITHUB_WORKSPACE/target/release/monty"
        fi
        export MONTY_BIN
        pip install typing_extensions
        pip install pydantic-monty --no-index --no-deps --find-links pgo-wheel --force-reinstall
        python exercise.py
        rustup run ${INPUTS_RUST_TOOLCHAIN} bash -c 'echo LLVM_PROFDATA=$RUSTUP_HOME/toolchains/$RUSTUP_TOOLCHAIN/lib/rustlib/$RUST_HOST/bin/llvm-profdata >> "$GITHUB_ENV"'
      shell: bash
      working-directory: crates/monty-python
      env:
        INPUTS_RUST_TOOLCHAIN: ${{ inputs.rust-toolchain }}

    - name: merge pgo data
      # PowerShell handles paths on Windows better, and works well enough on Unix
      run: ${{ env.LLVM_PROFDATA }} merge -o ${{ github.workspace }}/merged.profdata ${{ github.workspace }}/profdata # zizmor: ignore[template-injection]
      shell: pwsh

    - name: build pgo-optimized wheel
      uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1.50.1
      with:
        manylinux: auto
        args: >
          --release
          --out dist
          --interpreter ${{ inputs.interpreter }}
        rust-toolchain: ${{ inputs.rust-toolchain }}
        docker-options: -e CI
        working-directory: crates/monty-python
      env:
        RUSTFLAGS: '-Cprofile-use=${{ github.workspace }}/merged.profdata'

    - name: find built wheels
      id: find_wheel
      run: echo "dir=crates/monty-python/dist" >> "$GITHUB_OUTPUT"
      shell: bash
